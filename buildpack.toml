api = "0.7"

[buildpack]
  description = "A buildpack for starting a unicorn server for a Ruby app"
  homepage = "https://github.com/paketo-buildpacks/unicorn"
  id = "paketo-buildpacks/unicorn"
  keywords = ["ruby", "unicorn"]
  name = "Paketo Buildpack for Unicorn"

  [[buildpack.licenses]]
    type = "Apache-2.0"
    uri = "https://github.com/paketo-buildpacks/unicorn/blob/main/LICENSE"

[metadata]
  include-files = ["buildpack.toml", "linux/amd64/bin/build", "linux/amd64/bin/detect", "linux/amd64/bin/run", "linux/arm64/bin/build", "linux/arm64/bin/detect", "linux/arm64/bin/run"]
  pre-package = "./scripts/build.sh --target linux/amd64 --target linux/arm64"

[[stacks]]
  id = "io.buildpacks.stacks.jammy"

[[stacks]]
  id = "io.buildpacks.stacks.noble"

[[targets]]
  os = "linux"
  arch = "amd64"

[[targets]]
  os = "linux"
  arch = "arm64"
